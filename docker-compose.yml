services:
  app:
    build: .
    container_name: qrcode-relay-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_PORT: 8080
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      BASE_PATH: ${BASE_PATH:-}
      SESSION_TTL_MINUTES: ${SESSION_TTL_MINUTES:-20}
      CLEANUP_INTERVAL_MS: ${CLEANUP_INTERVAL_MS:-300000}
      FILE_STORAGE_DRIVER: ${FILE_STORAGE_DRIVER:-disabled}
      FILE_MAX_BYTES: ${FILE_MAX_BYTES:-26214400}
      FILE_UPLOAD_URL_TTL_SECONDS: ${FILE_UPLOAD_URL_TTL_SECONDS:-300}
      FILE_DOWNLOAD_URL_TTL_SECONDS: ${FILE_DOWNLOAD_URL_TTL_SECONDS:-60}
      FILE_RETENTION_MINUTES: ${FILE_RETENTION_MINUTES:-60}
      FILE_RETENTION_MIN_MINUTES: ${FILE_RETENTION_MIN_MINUTES:-5}
      FILE_RETENTION_MAX_MINUTES: ${FILE_RETENTION_MAX_MINUTES:-1440}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-qrcode}
      DB_PASSWORD: ${DB_PASSWORD:-qrcode_password}
      DB_NAME: ${DB_NAME:-qrcode_relay}
      DB_TABLE: ${DB_TABLE:-relay_sessions}
      DB_SHARE_TABLE: ${DB_SHARE_TABLE:-share_items}
      DB_CONNECT_RETRIES: ${DB_CONNECT_RETRIES:-20}
      DB_CONNECT_RETRY_MS: ${DB_CONNECT_RETRY_MS:-3000}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - qrcode-network

  db:
    image: mysql:8.4
    container_name: qrcode-relay-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-qrcode_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-qrcode_relay}
      MYSQL_USER: ${MYSQL_USER:-qrcode}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-qrcode_password}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - qrcode-network

volumes:
  mysql-data:

networks:
  qrcode-network:
    driver: bridge
