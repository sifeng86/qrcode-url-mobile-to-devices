# Bootstrap config for the first Certbot issuance.
#
# Replace these placeholders before copying into your production nginx conf.d directory:
# - example.com -> your real domain
# - /var/www/certbot -> your chosen Certbot webroot directory
# - 127.0.0.1:8080 -> the local Sendline app address if different

server {
    listen 80;
    listen [::]:80;
    server_name sendline.cachigo.com;

    client_max_body_size 32m;

    location ^~ /.well-known/acme-challenge/ {
        # Certbot must use: --webroot-path /var/www/certbot
        # Expected file path on disk: /var/www/certbot/.well-known/acme-challenge/<TOKEN>
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}