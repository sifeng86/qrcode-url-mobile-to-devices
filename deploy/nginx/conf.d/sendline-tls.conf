# Final HTTPS config after the certificate exists.
#
# Replace these placeholders before copying into your production nginx conf.d directory:
# - example.com -> your real domain
# - /var/www/certbot -> your chosen Certbot webroot directory
# - 127.0.0.1:8080 -> the local Sendline app address if different

server {
    listen 80;
    listen [::]:80;
    server_name sendline.cachigo.com;

    client_max_body_size 32m;

    location ^~ /.well-known/acme-challenge/ {
        # Certbot must use: --webroot-path /var/www/certbot
        # Expected file path on disk: /var/www/certbot/.well-known/acme-challenge/<TOKEN>
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://sendline.cachigo.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sendline.cachigo.com;

    client_max_body_size 32m;

    ssl_certificate /etc/letsencrypt/live/sendline.cachigo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sendline.cachigo.com/privkey.pem;
    # Keep the TLS config self-contained so it works with certbot --webroot/certonly.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_prefer_server_ciphers off;

    # Enable this after you confirm HTTPS works correctly for your domain.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location ^~ /.well-known/acme-challenge/ {
        # Certbot must use: --webroot-path /var/www/certbot
        # Expected file path on disk: /var/www/certbot/.well-known/acme-challenge/<TOKEN>
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}